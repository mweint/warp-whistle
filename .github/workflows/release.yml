name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore Smb3Editor.slnx
      - name: Test
        run: dotnet run --project tests/Smb3Editor.Core.Tests -c Release --no-restore
      - name: Package Warp Whistle
        run: >
          dotnet publish src/Smb3Editor.App -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=None -p:DebugSymbols=false -p:EnableTraceTools=false -o artifacts/release
      - name: Build portable ZIP
        shell: pwsh
        run: >
          pwsh -NoProfile -ExecutionPolicy Bypass -File tools/Build-PortablePackage.ps1
          -PublishDirectory artifacts/release -Assembler tools/asm6f/asm6f_64.exe -OutputDirectory artifacts/portable;
          Compress-Archive -Path artifacts/portable/WarpWhistle -DestinationPath
          "artifacts/WarpWhistle-${{ github.ref_name }}-win-x64.zip" -Force
      - name: Create alpha release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release delete "${{ github.ref_name }}" --yes;
          gh release create "${{ github.ref_name }}" "artifacts/WarpWhistle-${{ github.ref_name }}-win-x64.zip"
          --title "Warp Whistle ${{ github.ref_name }}" --generate-notes --prerelease
