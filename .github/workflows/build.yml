name: build

on:
  push:
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore Smb3Editor.slnx
      - name: Build
        run: dotnet build Smb3Editor.slnx -c Release --no-restore
      - name: Test
        run: dotnet run --project tests/Smb3Editor.Core.Tests -c Release --no-restore
      - name: Publish Windows x64
        run: dotnet publish src/Smb3Editor.App -c Release -r win-x64 --self-contained true -o artifacts/win-x64
      - uses: actions/upload-artifact@v4
        with:
          name: Smb3Editor-win-x64
          path: artifacts/win-x64

